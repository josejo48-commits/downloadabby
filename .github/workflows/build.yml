name: Build Android APK
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install flet yt-dlp

    - name: Setup Java
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Build APK
      run: |
        yes | flet build apk

    - name: Rename APK to a stable filename
      run: |
        mkdir -p dist
        cp build/apk/*.apk dist/downloadabby.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/apk/*.apk

    - name: Publish downloadable Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest
        name: "downloadabby (build automático)"
        body: "APK generado automáticamente desde el último commit en main."
        files: dist/downloadabby.apk
        # Reemplaza el asset del release 'latest' cada vez que se corre el workflow.
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
